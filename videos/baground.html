<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Developer Portfolio Background</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
overflow:hidden;
background:#020303;
font-family:monospace;
color:#00ffa6;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
}

.hero{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
box-sizing:border-box;
max-width:calc(100vw - 32px);

z-index:2;

padding:70px 90px;

border-radius:16px;

border:1px solid rgba(0,255,170,0.2);

background:rgba(0,0,0,0.35);

backdrop-filter:blur(10px);

}

.hero h1{
font-size:60px;
letter-spacing:8px;
margin:0;
text-shadow:0 0 25px #00ffa6;
line-height:1.1;
}

.hero p{
margin-top:20px;
opacity:0.7;
font-size:18px;
}

.progress{
margin-top:45px;
width:100%;
height:12px;
border-radius:20px;
background:rgba(0,255,170,0.15);
overflow:hidden;
}

.progress-bar{
height:100%;
width:35%;
background:linear-gradient(90deg,#00ffa6,#00e0ff,#00ffa6);
box-shadow:0 0 20px #00ffa6;
animation:loading 3s linear infinite;
}

@keyframes loading{
0%{transform:translateX(-120%)}
100%{transform:translateX(320%)}
}

@media (max-width:700px){
body{
padding:16px;
}

.hero{
 width:min(100%, 420px);
 padding:32px 24px;
}

.hero h1{
font-size:clamp(28px, 8vw, 42px);
letter-spacing:4px;
}

.hero p{
font-size:15px;
}
}

@media (prefers-reduced-motion: reduce){
.progress-bar{
animation:none;
width:100%;
}
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="hero">

<h1>WORK IN PROGRESS</h1>

<p>Crafting code. Building ideas. Creating the future.</p>

<div class="progress">
<div class="progress-bar"></div>
</div>

</div>

<script>

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
const prefersReducedMotion=window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
let lines=[];
let particles=[];
let falling=[];

function resetScene(){
const startY=90;
const maxX=Math.max(120,canvas.width-300);
const spacing=Math.max(56, Math.min(120, (canvas.height-160)/Math.max(1, code.length-1)));

lines=code.map((item,index)=>({
text:item,
x:50 + Math.random()*maxX,
y:Math.min(canvas.height-40, startY + index*spacing),
char:prefersReducedMotion ? item.length : 0
}));

particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:0.4+Math.random()*0.6
});
}

falling=[];
}

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
if(code.length){
resetScene();
}
}

/* developer code */

const code=[

"while(alive){ code(); learn(); build(); }",
"console.log('Dream. Code. Build. Repeat.');",
"const developer = 'Creative Mind';",
"function createFuture(){ return innovation; }",
"if(problem){ solve(problem); }",
"import creativity from 'mind';"

];

resize();
window.addEventListener("resize",resize);

function draw(){

ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* particles */

ctx.fillStyle="#00ffa6";

particles.forEach(p=>{

ctx.fillRect(p.x,p.y,p.size,p.size);

p.y+=p.speed;

if(p.y>canvas.height)p.y=0;

});

/* typing code */

ctx.font="16px monospace";

lines.forEach(line=>{

let visible=line.text.substring(0,line.char);

ctx.fillText(visible,line.x,line.y);

if(line.char < line.text.length){

line.char+=1;

}else{

if(prefersReducedMotion){
return;
}

falling.push({

char:line.text[Math.floor(Math.random()*line.text.length)],

x:line.x + Math.random()*200,

y:line.y,

speed:2+Math.random()*2

});

line.char=0;

}

});

if(prefersReducedMotion){
return;
}

falling.forEach((l,i)=>{

ctx.fillText(l.char,l.x,l.y);

l.y+=l.speed;

if(l.y>canvas.height){

falling.splice(i,1);

}

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
